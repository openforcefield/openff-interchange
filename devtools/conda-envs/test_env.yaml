name: openff-interchange-env
channels:
  - conda-forge
dependencies:
  # Core
  - python
  - numpy
  - pydantic
  # OpenFF stack
  - openff-toolkit-base =0.15.2
  - openff-units
  - openff-models
  # Needs to be explicitly listed to not be dropped when AmberTools is removed
  - rdkit
  # Optional features
  - mbuild
  - foyer =0.12.1
  - gmso =0.12
  # Testing
  - mdtraj
  - intermol
  - jax
  - pytest
  - pytest-cov
  - pytest-xdist
  - pytest-randomly
  - nbval
  - nglview
  # Drivers
  - gromacs =2023.3=nompi_*_103
  - lammps
  - panedr
  # Typing
  - mypy =1.3
  - typing-extensions
  - types-setuptools
  - pandas-stubs
  - pip:
    - git+https://github.com/jthorton/de-forcefields.git
    - git+https://github.com/openforcefield/openff-toolkit.git@base-virtual-site-type
